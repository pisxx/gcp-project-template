name: Provision Lab Project

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest

    env:
      REGION: us-central1
      BUDGET_AMOUNT: "50"
      ALLOWED_EMAIL_DOMAIN: pslawek-wiski-lab.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install yq
        run: |
          sudo apt-get update
          sudo apt-get install -y yq

      - name: Read project.yaml
        id: cfg
        run: |
          PROJECT_NAME="$(yq -r '.project.name' project.yaml)"
          if [ -z "${PROJECT_NAME}" ] || [ "${PROJECT_NAME}" = "null" ]; then
            echo "project.yaml missing .project.name"
            exit 1
          fi

          USERS="$(yq -r '.users.owners[]?, .users.editors[]?, .users.viewers[]?' project.yaml | sed '/^null$/d' || true)"
          if [ -n "${USERS}" ]; then
            while IFS= read -r EMAIL; do
              if [ -z "${EMAIL}" ]; then
                continue
              fi
              case "${EMAIL}" in
                *@${ALLOWED_EMAIL_DOMAIN}) ;;
                *)
                  echo "Invalid user email domain: ${EMAIL} (expected *@${ALLOWED_EMAIL_DOMAIN})"
                  exit 1
                  ;;
              esac
            done <<< "${USERS}"
          fi

          SAFE_NAME="$(echo "${PROJECT_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "${SAFE_NAME}" ]; then
            echo "project.yaml .project.name produced empty SAFE_NAME"
            exit 1
          fi

          REPO_HASH="$(echo "${GITHUB_REPOSITORY}" | shasum -a 256 | cut -c1-8)"
          PROJECT_ID="lab-${SAFE_NAME}-${REPO_HASH}"

          echo "project_name=${PROJECT_NAME}" >> "${GITHUB_OUTPUT}"
          echo "safe_name=${SAFE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "project_id=${PROJECT_ID}" >> "${GITHUB_OUTPUT}"

      - name: Create project (folder)
        run: |
          gcloud projects create "${{ steps.cfg.outputs.project_id }}" \
            --name="${{ steps.cfg.outputs.project_name }}" \
            --folder="${{ secrets.GCP_LABS_FOLDER_ID }}"

      - name: Link billing
        run: |
          gcloud billing projects link "${{ steps.cfg.outputs.project_id }}" \
            --billing-account="${{ secrets.GCP_BILLING_ACCOUNT_ID }}"

      - name: Enable baseline APIs
        run: |
          gcloud services enable \
            cloudbilling.googleapis.com \
            cloudresourcemanager.googleapis.com \
            iam.googleapis.com \
            serviceusage.googleapis.com \
            --project="${{ steps.cfg.outputs.project_id }}"

      - name: Apply IAM (users.*)
        run: |
          PROJECT_ID="${{ steps.cfg.outputs.project_id }}"

          OWNERS="$(yq -r '.users.owners[]?' project.yaml | sed '/^null$/d' || true)"
          EDITORS="$(yq -r '.users.editors[]?' project.yaml | sed '/^null$/d' || true)"
          VIEWERS="$(yq -r '.users.viewers[]?' project.yaml | sed '/^null$/d' || true)"

          if [ -n "${OWNERS}" ]; then
            while IFS= read -r EMAIL; do
              if [ -z "${EMAIL}" ]; then
                continue
              fi
              gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
                --member="user:${EMAIL}" \
                --role="roles/owner" \
                --quiet
            done <<< "${OWNERS}"
          fi

          if [ -n "${EDITORS}" ]; then
            while IFS= read -r EMAIL; do
              if [ -z "${EMAIL}" ]; then
                continue
              fi
              gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
                --member="user:${EMAIL}" \
                --role="roles/editor" \
                --quiet
            done <<< "${EDITORS}"
          fi

          if [ -n "${VIEWERS}" ]; then
            while IFS= read -r EMAIL; do
              if [ -z "${EMAIL}" ]; then
                continue
              fi
              gcloud projects add-iam-policy-binding "${PROJECT_ID}" \
                --member="user:${EMAIL}" \
                --role="roles/viewer" \
                --quiet
            done <<< "${VIEWERS}"
          fi

      - name: Set default region
        run: |
          gcloud config set compute/region "${REGION}"

      - name: Create budget (hardcoded defaults)
        run: |
          gcloud billing budgets create \
            --billing-account="${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
            --display-name="Lab Budget (${{ steps.cfg.outputs.project_id }})" \
            --budget-amount="${BUDGET_AMOUNT}USD" \
            --filter-projects="projects/${{ steps.cfg.outputs.project_id }}"

